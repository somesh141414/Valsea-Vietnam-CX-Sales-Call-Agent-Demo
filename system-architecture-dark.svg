<svg width="920" height="320" viewBox="0 0 920 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agora Conversational AI Next.js Quickstart Architecture</title>
  <desc id="desc">Browser talks to the Next.js app for token and agent lifecycle requests. Browser and Next.js app both connect to Agora Cloud for real-time audio, transcripts, state, and agent session management.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#0F1B2E"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111C2E"/>
      <stop offset="1" stop-color="#16243A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7DD3FC"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2E8F0"/>
    </marker>
    <style>
      .label { font: 600 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .body { font: 500 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B6C2D2; }
      .small { font: 600 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7DD3FC; }
      .small-light { font: 600 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E2E8F0; }
    </style>
  </defs>

  <rect width="920" height="320" rx="24" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="48" y="88" width="220" height="144" rx="20" fill="url(#box)" stroke="#27476B"/>
    <text x="158" y="136" text-anchor="middle" class="label">Browser</text>
    <text x="158" y="164" text-anchor="middle" class="body">Voice UI</text>
    <text x="158" y="186" text-anchor="middle" class="body">Mic + Transcript</text>
    <text x="158" y="208" text-anchor="middle" class="body">AgentVisualizer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="88" width="220" height="144" rx="20" fill="url(#box)" stroke="#27476B"/>
    <text x="460" y="136" text-anchor="middle" class="label">Next.js App</text>
    <text x="460" y="164" text-anchor="middle" class="body">App Router UI</text>
    <text x="460" y="186" text-anchor="middle" class="body">API routes</text>
    <text x="460" y="208" text-anchor="middle" class="body">token / invite / stop</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="652" y="88" width="220" height="144" rx="20" fill="url(#box)" stroke="#27476B"/>
    <text x="762" y="136" text-anchor="middle" class="label">Agora Cloud</text>
    <text x="762" y="164" text-anchor="middle" class="body">RTC + RTM</text>
    <text x="762" y="186" text-anchor="middle" class="body">Conversational AI agent</text>
    <text x="762" y="208" text-anchor="middle" class="body">audio + state + transcript</text>
  </g>

  <path d="M268 132 C300 132, 318 132, 350 132" stroke="#7DD3FC" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="309" y="116" text-anchor="middle" class="small">token / invite / stop</text>

  <path d="M652 188 C620 188, 602 188, 570 188" stroke="#E2E8F0" stroke-width="3" marker-end="url(#arrow-light)"/>
  <text x="611" y="172" text-anchor="middle" class="small-light">manage agent session</text>

  <path d="M268 210 C430 282, 490 282, 652 210" stroke="#7DD3FC" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="460" y="286" text-anchor="middle" class="small">audio / transcript / state</text>
</svg>
